name: Build
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]
    tags: [ "v*.*.*" ]

jobs:
  tests:
    name: ✅ Run tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Set up Python ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies with UV
      run: uv sync --extra agent

    - name: Lint
      run: uvx ruff check

    - name: Format
      run: uvx ruff format --check

    - name: Type check
      run: uvx ty check

    # - name: Start server
    #   run: |
    #     SERVER_PORT=8001 OPENSEARCH_URL=http://localhost:9200 uv run uvicorn src.data_commons_search.main:app --host 0.0.0.0 --port 8001 --log-config logging.yml --reload &
    #     sleep 10

    # - name: Run tests
    #   run: uv run pytest

  docker:
    name: 🐳 Build Docker image
    runs-on: ubuntu-latest
    # needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-metadata: ${{ steps.meta.outputs.json }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/eosc-data-commons/data-commons-search
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: linux/amd64, linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # outputs: type=image,name=ghcr.io/eosc-data-commons/data-commons-search,push-by-digest=true,name-canonical=true,push=true


  generate-changelog:
    name: 🏔️ Generate changelog for the GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4.8.0
        id: git-cliff
        with:
          config: pyproject.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md

      - name: Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          body_path: CHANGES.md
