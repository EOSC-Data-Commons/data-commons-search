services:
  data-commons-search:
    build: 
      context: .
      args:
        UV_HTTP_TIMEOUT: 180
        PYPI_INDEX_URL: https://pypi.org/simple
    # image: ghcr.io/eosc-data-commons/data-commons-search:main
    ports:
      - "8000:8000"
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
    env_file:
      - keys.env
    volumes:
      - ./data:/app/data # For logs